name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: >
          Release tag (e.g. v3.052-rc1 for a release candidate or v3.052 for
          final). Defaults to the version from sdr_ui.h with an -rc1 suffix.
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release (release candidate)'
        type: boolean
        required: false
        default: true

# Only allow one release build at a time to avoid concurrent pushes to main.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-rpi:
    name: Build and publish release image for Raspberry Pi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and tag
        run: |
          CODE_VERSION=$(grep '#define VER_STR' sdr_ui.h | awk '{print $4}' | sed -e 's/"//g' | awk '{print $NF}')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${CODE_VERSION}-rc1"
          fi
          ARCHIVE="zbitx-${TAG}-rpi.tar.gz"
          echo "CODE_VERSION=${CODE_VERSION}" >> $GITHUB_ENV
          echo "TAG=${TAG}"                   >> $GITHUB_ENV
          echo "ARCHIVE=${ARCHIVE}"           >> $GITHUB_ENV

      - name: Create and push release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ env.TAG }}" -m "Release ${{ env.TAG }}"
          git push origin "${{ env.TAG }}"

      - name: Add ARMhf architecture and install cross-compilation toolchain
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            make \
            sqlite3 \
            pkg-config \
            libasound2-dev:armhf \
            libfftw3-dev:armhf \
            libgtk-3-dev:armhf \
            libsqlite3-dev:armhf \
            libncurses5-dev:armhf

      - name: Build WiringPi for ARM
        run: |
          git clone https://github.com/WiringPi/WiringPi.git /tmp/WiringPi
          cd /tmp/WiringPi/wiringPi
          make CC=arm-linux-gnueabihf-gcc AR=arm-linux-gnueabihf-ar
          sudo cp libwiringPi.so* /usr/lib/arm-linux-gnueabihf/
          sudo cp wiringPi.h /usr/include/

      - name: Build ft8_lib for ARM
        working-directory: ft8_lib
        run: |
          make CC=arm-linux-gnueabihf-gcc AR=arm-linux-gnueabihf-ar all

      - name: Create required data files
        run: |
          mkdir -p data audio web
          cd data
          sqlite3 sbitx.db < create_db.sql

      - name: Cross-compile sbitx for Raspberry Pi (ARMhf)
        run: |
          echo "Building version: ${{ env.CODE_VERSION }} (tag: ${{ env.TAG }})"
          PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig \
          PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig \
          arm-linux-gnueabihf-gcc -g -o sbitx \
            vfo.c si570.c sbitx_sound.c fft_filter.c sbitx_gtk.c sbitx_utils.c \
            i2cbb.c si5351v2.c ini.c hamlib.c queue.c modems.c logbook.c \
            modem_cw.c settings_ui.c oled.c hist_disp.c ntputil.c \
            telnet.c macros.c modem_ft8.c remote.c mongoose.c webserver.c sbitx.c \
            ft8_lib/libft8.a \
            -lwiringPi -lasound -lm -lfftw3 -lfftw3f -pthread -lncurses -lsqlite3 \
            -L/usr/lib/arm-linux-gnueabihf \
            $(PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig pkg-config --cflags gtk+-3.0) \
            $(PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig pkg-config --libs gtk+-3.0)
          file sbitx

      - name: Package release archive
        run: |
          mkdir -p release release_pkg/zbitx
          cp sbitx release_pkg/zbitx/
          cp start.sh update update_zbitx release_pkg/zbitx/
          cp sbitx_user_settings.ini sbitx_wisdom.wis sbitx_wisdom_f.wis release_pkg/zbitx/
          cp -r data web release_pkg/zbitx/
          tar -czf "release/${{ env.ARCHIVE }}" -C release_pkg zbitx
          rm -rf release_pkg
          echo "Release archive created: release/${{ env.ARCHIVE }}"

      - name: Commit release archive to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Switch to (or create) the main branch so the archive is committed there
          git fetch origin main
          git checkout -B main origin/main
          git add -f "release/${{ env.ARCHIVE }}"
          git diff --cached --quiet || \
            git commit -m "Add release archive ${{ env.ARCHIVE }} [skip ci]"
          git push origin main

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tags containing -rc, -alpha, or -beta are treated as pre-releases.
          PRERELEASE_FLAG=""
          if [ "${{ github.event.inputs.prerelease }}" = "true" ] || echo "${{ env.TAG }}" | grep -qE '\-(rc|alpha|beta)'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ env.TAG }}" \
            "release/${{ env.ARCHIVE }}" \
            --title "zBitx ${{ env.TAG }}" \
            --generate-notes \
            $PRERELEASE_FLAG
