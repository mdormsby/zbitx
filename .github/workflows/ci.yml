name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            make \
            libasound2-dev \
            libfftw3-dev \
            libgtk-3-dev \
            libsqlite3-dev \
            libncurses5-dev \
            sqlite3

      - name: Install WiringPi from source
        run: |
          git clone https://github.com/WiringPi/WiringPi.git /tmp/WiringPi
          cd /tmp/WiringPi
          ./build

      - name: Build ft8_lib and run tests
        working-directory: ft8_lib
        run: |
          make all
          make run_tests

      - name: Install ft8_lib
        working-directory: ft8_lib
        run: |
          sudo make install

      - name: Create required data files
        run: |
          mkdir -p data audio web
          cd data
          sqlite3 sbitx.db < create_db.sql

      - name: Build zbitx
        run: |
          chmod +x build
          ./build sbitx
